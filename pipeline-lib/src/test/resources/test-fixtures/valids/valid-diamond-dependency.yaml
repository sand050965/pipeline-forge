pipeline:
  name: valid-diamond-dependency
  description: Valid diamond dependency pattern

stages:
  - test

job1:
  - stage: test
  - image: alpine:latest
  - script: echo "job1"

job2:
  - stage: test
  - image: alpine:latest
  - script: echo "job2"
  - needs: [ job1 ]

job3:
  - stage: test
  - image: alpine:latest
  - script: echo "job3"
  - needs: [ job1 ]

job4:
  - stage: test
  - image: alpine:latest
  - script: echo "job4"
  - needs: [ job2, job3 ]