{{- if .Values.rabbitmq.enabled }}
# Placeholder values - replace with real secrets in production
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  labels:
    {{- include "cicd-system.labels" . | nindent 4 }}
type: Opaque
data:
  RABBITMQ_DEFAULT_USER: {{ .Values.rabbitmq.credentials.user }}
  RABBITMQ_DEFAULT_PASS: {{ .Values.rabbitmq.credentials.password }}
{{- end }}
